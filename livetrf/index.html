<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Sydney CBD — Live Traffic Cams</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0a0a; --sur:#111; --brd:#222; --acc:#e8ff3b;
  --red:#ff4d4d; --txt:#f0f0f0; --mut:#555; --dim:#1e1e1e;
  --hh:58px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:'Syne',sans-serif;overflow:hidden}

/* ── HEADER ── */
header{
height:var(–hh);display:flex;align-items:center;justify-content:space-between;
padding:0 18px;border-bottom:1px solid var(–brd);flex-shrink:0;
background:var(–bg);z-index:200;position:relative;
}
.logo-title{font-size:.95rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;line-height:1}
.logo-sub{font-family:‘DM Mono’,monospace;font-size:.58rem;color:var(–mut);letter-spacing:.1em;text-transform:uppercase;margin-top:3px}
.hdr-right{display:flex;align-items:center;gap:8px}
.live-pill{display:flex;align-items:center;gap:5px;font-family:‘DM Mono’,monospace;font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:var(–red);padding:4px 8px;border:1px solid rgba(255,77,77,.3)}
.live-pill::before{content:’’;width:6px;height:6px;background:var(–red);border-radius:50%;animation:pulse 1.4s ease-in-out infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.75)}}
.hbtn{background:none;border:1px solid var(–brd);color:var(–txt);font-family:‘DM Mono’,monospace;font-size:.62rem;letter-spacing:.07em;text-transform:uppercase;padding:6px 11px;cursor:pointer;transition:all .15s;white-space:nowrap}
.hbtn:hover{border-color:var(–acc);color:var(–acc)}
.hbtn.active{background:var(–acc);color:var(–bg);border-color:var(–acc);font-weight:700}
.hbtn-icon{padding:6px 10px;font-size:.9rem}
#btn-list{display:none}

/* ── LAYOUT ── */
#app{display:flex;height:calc(100% - var(–hh));overflow:hidden}
.feed-col{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden;padding:14px;gap:12px}
.sidebar{width:290px;flex-shrink:0;display:flex;flex-direction:column;border-left:1px solid var(–brd);overflow:hidden}

/* ── CAM AREA ── */
#cam-area{flex:1;min-height:0;display:flex;position:relative}
#cam-area.mode-single .cam-slot{flex:1;display:flex}
#cam-area.mode-single .cam-slot:not(:first-child){display:none}
#cam-area.mode-grid{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:3px}
#cam-area.mode-grid .cam-slot{display:flex}

/* ── SLOT ── */
.cam-slot{
position:relative;background:var(–sur);overflow:hidden;
align-items:center;justify-content:center;cursor:default;
}
.slot-img{width:100%;height:100%;object-fit:contain;display:block;transition:opacity .25s}
.mode-grid .slot-img{object-fit:cover}
.slot-img.fading{opacity:0}
.slot-err{
display:none;position:absolute;inset:0;flex-direction:column;align-items:center;
justify-content:center;background:rgba(10,10,10,.9);gap:8px;z-index:4;
font-family:‘DM Mono’,monospace;font-size:.65rem;color:var(–red);
letter-spacing:.1em;text-transform:uppercase;
}
.slot-err span{font-size:1.4rem}
.c-tl,.c-tr,.c-bl,.c-br{position:absolute;width:13px;height:13px;border-color:var(–acc);border-style:solid;z-index:3;pointer-events:none}
.c-tl{top:8px;left:8px;border-width:2px 0 0 2px}
.c-tr{top:8px;right:8px;border-width:2px 2px 0 0}
.c-bl{bottom:8px;left:8px;border-width:0 0 2px 2px}
.c-br{bottom:8px;right:8px;border-width:0 2px 2px 0}
.mode-grid .c-tl,.mode-grid .c-tr,.mode-grid .c-bl,.mode-grid .c-br{display:none}
.slot-stamp{
position:absolute;top:6px;right:6px;z-index:3;
background:rgba(0,0,0,.78);border:1px solid rgba(232,255,59,.2);
padding:2px 7px;font-family:‘DM Mono’,monospace;font-size:.52rem;
letter-spacing:.05em;display:flex;align-items:center;gap:4px;white-space:nowrap;pointer-events:none;
}
.s-time{color:var(–acc)}
.s-sep{color:var(–mut)}
.s-age{color:rgba(255,255,255,.55)}
.slot-foot{
position:absolute;bottom:0;left:0;right:0;z-index:3;
background:linear-gradient(transparent,rgba(0,0,0,.82) 45%);
padding:22px 8px 6px;cursor:default;
}
.s-title{
font-family:‘DM Mono’,monospace;font-size:.55rem;color:rgba(255,255,255,.9);
text-transform:uppercase;letter-spacing:.07em;
white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.s-desc{
position:absolute;bottom:100%;left:0;right:0;
background:rgba(0,0,0,.93);border-top:1px solid rgba(255,255,255,.08);
color:rgba(255,255,255,.65);font-family:‘DM Mono’,monospace;
font-size:.58rem;padding:8px 10px;line-height:1.55;
opacity:0;pointer-events:none;transition:opacity .15s,transform .15s;
transform:translateY(4px);white-space:normal;word-wrap:break-word;
}
.slot-foot:hover .s-desc,.slot-foot.open .s-desc{opacity:1;pointer-events:auto;transform:translateY(0)}

/* ── SINGLE INFO ── */
#single-info{flex-shrink:0;display:flex;flex-direction:column;gap:5px}
#single-info.hidden{display:none}
#info-title{font-size:1.4rem;font-weight:800;letter-spacing:-.01em;line-height:1.1}
#info-view{font-family:‘DM Mono’,monospace;font-size:.72rem;color:var(–mut);line-height:1.55}
.dist-pill{display:inline-block;font-family:‘DM Mono’,monospace;font-size:.58rem;background:var(–dim);color:var(–acc);padding:2px 8px;letter-spacing:.07em;align-self:flex-start}

/* ── PROGRESS ── */
.prog-track{height:2px;background:var(–dim);flex-shrink:0;position:relative;overflow:hidden}
.prog-bar{height:100%;background:var(–acc);width:0%;transition:width linear;box-shadow:0 0 6px rgba(232,255,59,.5)}

/* ── CONTROLS ── */
.controls{display:flex;align-items:center;gap:6px;flex-shrink:0;flex-wrap:wrap}
.btn{background:none;border:1px solid var(–brd);color:var(–txt);font-family:‘DM Mono’,monospace;font-size:.65rem;letter-spacing:.07em;text-transform:uppercase;padding:8px 12px;cursor:pointer;transition:all .15s;min-height:38px}
.btn:hover{border-color:var(–acc);color:var(–acc)}
.btn.active{background:var(–acc);color:var(–bg);border-color:var(–acc);font-weight:700}
.speed-grp{display:flex;gap:3px;margin-left:auto;align-items:center}
.speed-lbl{font-family:‘DM Mono’,monospace;font-size:.58rem;color:var(–mut);letter-spacing:.07em;text-transform:uppercase;margin-right:3px}
#cam-counter-bar{font-family:‘DM Mono’,monospace;font-size:.6rem;color:var(–mut);letter-spacing:.07em}

/* ── SIDEBAR ── */
.sidebar-hd{flex-shrink:0;padding:18px 20px 14px;border-bottom:1px solid var(–brd)}
.sidebar-lbl{font-family:‘DM Mono’,monospace;font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;color:var(–mut);margin-bottom:5px}
.sidebar-cnt{font-size:1.8rem;font-weight:800;color:var(–acc);line-height:1}
.sidebar-cnt span{font-size:.7rem;font-weight:400;color:var(–mut);font-family:‘DM Mono’,monospace;margin-left:4px;vertical-align:middle}
.cam-list{flex:1;overflow-y:auto;min-height:0;scrollbar-width:thin;scrollbar-color:var(–dim) transparent}
.cam-list::-webkit-scrollbar{width:4px}
.cam-list::-webkit-scrollbar-track{background:transparent}
.cam-list::-webkit-scrollbar-thumb{background:var(–dim)}
.cli{padding:11px 18px;border-bottom:1px solid var(–brd);cursor:pointer;display:flex;gap:10px;align-items:flex-start;transition:background .1s;border-left:2px solid transparent}
.cli:hover{background:var(–sur)}
.cli.active{background:var(–sur);border-left-color:var(–acc)}
.cli-num{font-family:‘DM Mono’,monospace;font-size:.56rem;color:var(–mut);min-width:20px;padding-top:2px;letter-spacing:.04em}
.cli.active .cli-num{color:var(–acc)}
.cli-name{font-size:.78rem;font-weight:700;line-height:1.3;letter-spacing:-.01em}
.cli-dist{font-family:‘DM Mono’,monospace;font-size:.56rem;color:var(–mut);margin-top:2px}

/* ── BOTTOM SHEET ── */
#sheet-backdrop{
display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);
z-index:400;opacity:0;transition:opacity .25s;pointer-events:none;
}
#sheet-backdrop.visible{opacity:1;pointer-events:auto}
#bottom-sheet{
display:none;position:fixed;bottom:0;left:0;right:0;
background:var(–bg);border-top:1px solid var(–brd);
z-index:500;border-radius:14px 14px 0 0;
transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);
max-height:80vh;flex-direction:column;
padding-bottom:var(–safe-bot);
}
#bottom-sheet.open{transform:translateY(0)}
.sheet-handle{
width:36px;height:4px;background:var(–brd);border-radius:2px;
margin:10px auto 0;flex-shrink:0;cursor:grab;touch-action:none;
}
.sheet-hd{
display:flex;align-items:center;justify-content:space-between;
padding:12px 18px 10px;border-bottom:1px solid var(–brd);flex-shrink:0;
}
.sheet-title{font-family:‘DM Mono’,monospace;font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:var(–mut)}
.sheet-close{background:none;border:none;color:var(–mut);font-size:1.1rem;cursor:pointer;padding:4px;line-height:1}
.sheet-list{overflow-y:auto;flex:1;min-height:0;-webkit-overflow-scrolling:touch}

/* ── FULLSCREEN ── */
body.fs header{display:none}
body.fs .sidebar{display:none}
body.fs #app{height:100vh}
body.fs .feed-col{padding:8px;gap:8px}
body.fs #single-info{display:none!important}

/* ══════════════════════════════════════
MOBILE ≤ 720px
══════════════════════════════════════ */
@media(max-width:720px){
:root{ –hh:50px; }

/* header */
header{padding:0 10px}
.logo-title{font-size:.78rem}
.logo-sub{font-size:.5rem}
.hbtn{padding:5px 9px;font-size:.56rem}
.hbtn-icon{padding:5px 8px}
/* show list toggle, hide fullscreen */
#btn-list{display:flex;align-items:center;gap:4px}
#btn-fs{display:none}

/* layout: feed fills everything, desktop sidebar hidden */
#app{flex-direction:column}
.sidebar{display:none}

/* feed col: tight, camera fills */
.feed-col{padding:6px 6px 0;gap:6px}
#cam-area{flex:1;min-height:0}

/* hide single-info — overlay text handles it */
#single-info{display:none!important}

/* thicker progress line */
.prog-track{height:3px}

/* controls: single full-width bar with big tap targets */
.controls{
flex-wrap:nowrap;gap:0;
padding:6px 6px calc(6px + var(–safe-bot));
background:var(–bg);border-top:1px solid var(–brd);
flex-shrink:0;
}
#btn-prev,#btn-next{flex:1;min-height:46px;font-size:.68rem;border-radius:0}
#btn-pause{flex:1.5;min-height:46px;font-size:.68rem;border-radius:0;border-left:none;border-right:none}
#btn-prev{border-right:none}
.speed-grp{flex-shrink:0;gap:0;margin-left:0;border-left:1px solid var(–brd)}
.speed-lbl{display:none}
.speed-grp .btn{min-height:46px;padding:0 11px;font-size:.58rem;border-left:none;border-right:none;border-radius:0}
.speed-grp .btn:last-child{border-right:1px solid var(–brd)}
#cam-counter-bar{display:none}

/* slot overlays */
.s-title{font-size:.56rem}
.slot-stamp{font-size:.5rem;padding:3px 6px}

/* activate bottom sheet */
#sheet-backdrop{display:block}
#bottom-sheet{display:flex}
}

/* small phones */
@media(max-width:380px){
.mode-grid .s-title,.mode-grid .slot-stamp{display:none}
.speed-grp .btn{padding:0 8px}
}

/* landscape mobile */
@media(max-width:720px) and (orientation:landscape){
:root{ –hh:42px; }
.feed-col{padding:4px 4px 0;gap:4px}
.controls{padding:4px 4px calc(4px + var(–safe-bot))}
#btn-prev,#btn-next,#btn-pause{min-height:38px}
.speed-grp .btn{min-height:38px}
}
</style>

  { title:"William Street (East Sydney)",        view:"Corner of William Street and College Street near Hyde Park looking east towards Kings Cross.",                     href:"https://webcams.transport.nsw.gov.au/livetraffic-webcams/cameras/william_street_east_sydney.jpeg",        lat:-33.87375,   lon:151.2126,   dist:0.6291 },
  { title:"York St and Margaret St (Sydney)",    view:"York Street at Margaret Street looking north towards Sydney Harbour Bridge.",                                      href:"https://webcams.transport.nsw.gov.au/livetraffic-webcams/cameras/york_st_and_margaret_st_sydney.jpeg",    lat:-33.865088,  lon:151.205623, dist:0.5344 },
];

// ── STATE ────────────────────────────────────────────
let baseIndex = 0;
let mode = 'single';
let paused = false;
let intervalMs = 10000;
let cycleTimer = null;

// ── SLOT REFS ────────────────────────────────────────
const SLOTS = [0,1,2,3].map(i => {
  const el = document.getElementById('slot-' + i);
  const s = {
    el, img:el.querySelector('.slot-img'), err:el.querySelector('.slot-err'),
    timeEl:el.querySelector('.s-time'), ageEl:el.querySelector('.s-age'),
    titleEl:el.querySelector('.s-title'), descEl:el.querySelector('.s-desc'),
    foot:el.querySelector('.slot-foot'), loadedAt:null, camIndex:-1, blobUrl:null,
  };
  s.foot.addEventListener('touchstart', e => {
    const isOpen = s.foot.classList.contains('open');
    document.querySelectorAll('.slot-foot.open').forEach(f => f.classList.remove('open'));
    if (!isOpen) {
      e.preventDefault();
      s.foot.classList.add('open');
      setTimeout(() => s.foot.classList.remove('open'), 3500);
    }
  }, {passive:false});
  return s;
});

// ── UTILS ────────────────────────────────────────────
const PROXY = 'https://corsproxy.io/?';
function px(url) { return PROXY + encodeURIComponent(url); }
function hms(ts) { return new Date(ts).toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit',second:'2-digit'}); }
function fmtAge(ms) {
  const s = Math.floor(ms/1000);
  if (s < 120) return s + 's';
  return Math.floor(s/60) + 'm ' + (s%60).toString().padStart(2,'0') + 's';
}
function slotCount() { return mode === 'grid' ? 4 : 1; }
function stepSize()  { return mode === 'grid' ? 4 : 1; }
function isMobile()  { return window.innerWidth <= 720; }

// ── LOAD SLOT ────────────────────────────────────────
async function loadSlot(si, ci) {
  const s = SLOTS[si];
  const cam = cameras[ci % cameras.length];
  s.camIndex = ci % cameras.length;
  s.titleEl.textContent = cam.title;
  s.descEl.textContent  = cam.view;
  s.img.classList.add('fading');
  s.err.style.display = 'none';
  const url = px(cam.href + '?_t=' + Date.now());
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const lastMod = res.headers.get('last-modified');
    const imageTime = (lastMod ? new Date(lastMod).getTime() : Date.now()) - 1000;
    const blob = await res.blob();
    const blobUrl = URL.createObjectURL(blob);
    if (s.blobUrl) URL.revokeObjectURL(s.blobUrl);
    s.blobUrl = blobUrl;
    s.img.src = blobUrl;
    s.img.classList.remove('fading');
    s.loadedAt = imageTime;
    s.timeEl.textContent = hms(imageTime);
    s.ageEl.textContent  = '0s';
  } catch(e) {
    s.img.classList.add('fading');
    s.err.style.display = 'flex';
    s.timeEl.textContent = 'ERR';
    s.ageEl.textContent  = '—';
  }
}

// ── AGE TICKER ───────────────────────────────────────
function tickAges() {
  const n = slotCount();
  for (let i = 0; i < n; i++) {
    const s = SLOTS[i];
    if (s.loadedAt) s.ageEl.textContent = fmtAge(Date.now() - s.loadedAt);
  }
}

// ── RENDER ───────────────────────────────────────────
function render() {
  const n = slotCount();
  document.getElementById('cam-area').className = 'mode-' + mode;
  for (let i = 0; i < 4; i++) {
    if (i < n) { SLOTS[i].el.style.display = ''; loadSlot(i, (baseIndex + i) % cameras.length); }
    else        { SLOTS[i].el.style.display = 'none'; }
  }
  const si = document.getElementById('single-info');
  if (mode === 'single' && !isMobile()) {
    si.classList.remove('hidden');
    const cam = cameras[baseIndex % cameras.length];
    document.getElementById('info-title').textContent = cam.title;
    document.getElementById('info-dist').textContent  = cam.dist.toFixed(2) + ' km from CBD';
    document.getElementById('info-view').textContent  = cam.view;
  } else {
    si.classList.add('hidden');
  }
  const end = Math.min(baseIndex + n, cameras.length);
  document.getElementById('cam-counter-bar').textContent =
    mode === 'single' ? (baseIndex+1)+' / '+cameras.length : (baseIndex+1)+'–'+end+' / '+cameras.length;
  updateList();
}

// ── LIST ─────────────────────────────────────────────
function buildListIn(container) {
  container.innerHTML = '';
  cameras.forEach((cam, i) => {
    const d = document.createElement('div');
    d.className = 'cli'; d.dataset.idx = i;
    d.innerHTML = `<div class="cli-num">${String(i+1).padStart(2,'0')}</div>
      <div><div class="cli-name">${cam.title}</div>
      <div class="cli-dist">${cam.dist.toFixed(2)} km</div></div>`;
    d.addEventListener('click', () => { jumpTo(i); closeSheet(); });
    container.appendChild(d);
  });
}
function buildList() {
  buildListIn(document.getElementById('cam-list'));
  buildListIn(document.getElementById('sheet-list'));
}
function updateList() {
  const n = slotCount();
  const active = new Set();
  for (let i = 0; i < n; i++) active.add((baseIndex + i) % cameras.length);
  ['cam-list','sheet-list'].forEach(id => {
    document.getElementById(id).querySelectorAll('.cli').forEach(el => {
      el.classList.toggle('active', active.has(+el.dataset.idx));
    });
    const a = document.getElementById(id).querySelector('.cli.active');
    if (a) a.scrollIntoView({block:'nearest',behavior:'smooth'});
  });
}

// ── CYCLE ────────────────────────────────────────────
function startProgress() {
  const bar = document.getElementById('prog-bar');
  bar.style.transition = 'none'; bar.style.width = '0%';
  requestAnimationFrame(() => { bar.style.transition = `width ${intervalMs}ms linear`; bar.style.width = '100%'; });
}
function startCycle() {
  clearInterval(cycleTimer);
  cycleTimer = setInterval(() => { if (!paused) advance(); }, intervalMs);
}
function advance() { baseIndex = (baseIndex + stepSize()) % cameras.length; render(); startProgress(); }
function jumpTo(idx) { baseIndex = idx; render(); startProgress(); clearInterval(cycleTimer); startCycle(); }

// ── CONTROLS ─────────────────────────────────────────
document.getElementById('btn-prev').addEventListener('click', () => jumpTo((baseIndex - stepSize() + cameras.length) % cameras.length));
document.getElementById('btn-next').addEventListener('click', () => jumpTo((baseIndex + stepSize()) % cameras.length));

const pauseBtn = document.getElementById('btn-pause');
pauseBtn.addEventListener('click', () => {
  paused = !paused;
  pauseBtn.textContent = paused ? '▶ Play' : '❚❚ Pause';
  pauseBtn.classList.toggle('active', !paused);
  if (paused) {
    clearInterval(cycleTimer);
    const bar = document.getElementById('prog-bar');
    const w = parseFloat(getComputedStyle(bar).width);
    bar.style.transition = 'none';
    bar.style.width = (w / bar.parentElement.offsetWidth * 100) + '%';
  } else { startProgress(); startCycle(); }
});

[['btn-5s',5000],['btn-10s',10000],['btn-20s',20000]].forEach(([id,ms]) => {
  document.getElementById(id).addEventListener('click', function(){
    intervalMs = ms;
    document.querySelectorAll('.speed-grp .btn').forEach(b=>b.classList.remove('active'));
    this.classList.add('active');
    if (!paused) { startProgress(); clearInterval(cycleTimer); startCycle(); }
  });
});

document.getElementById('btn-mode-1').addEventListener('click', () => {
  mode = 'single';
  document.getElementById('btn-mode-1').classList.add('active');
  document.getElementById('btn-mode-4').classList.remove('active');
  render(); startProgress(); clearInterval(cycleTimer); startCycle();
});
document.getElementById('btn-mode-4').addEventListener('click', () => {
  mode = 'grid';
  document.getElementById('btn-mode-4').classList.add('active');
  document.getElementById('btn-mode-1').classList.remove('active');
  render(); startProgress(); clearInterval(cycleTimer); startCycle();
});

// ── FULLSCREEN ────────────────────────────────────────
const fsBtn = document.getElementById('btn-fs');
fsBtn.addEventListener('click', () => {
  if (!document.fullscreenElement && !document.webkitFullscreenElement) {
    const el = document.documentElement;
    (el.requestFullscreen||el.webkitRequestFullscreen||el.mozRequestFullScreen||function(){}).call(el).catch(()=>{});
  } else {
    (document.exitFullscreen||document.webkitExitFullscreen||document.mozCancelFullScreen||function(){}).call(document).catch(()=>{});
  }
});
['fullscreenchange','webkitfullscreenchange','mozfullscreenchange'].forEach(evt => {
  document.addEventListener(evt, () => {
    const fs = !!(document.fullscreenElement||document.webkitFullscreenElement);
    document.body.classList.toggle('fs', fs);
    fsBtn.textContent = fs ? '✕' : '⛶';
  });
});

// ── BOTTOM SHEET ─────────────────────────────────────
const sheet    = document.getElementById('bottom-sheet');
const backdrop = document.getElementById('sheet-backdrop');
function openSheet()  { sheet.classList.add('open'); backdrop.classList.add('visible'); }
function closeSheet() { sheet.classList.remove('open'); backdrop.classList.remove('visible'); }

document.getElementById('btn-list').addEventListener('click', openSheet);
document.getElementById('sheet-close').addEventListener('click', closeSheet);
backdrop.addEventListener('click', closeSheet);

// drag-to-dismiss
(function(){
  const handle = document.getElementById('sheet-handle');
  let startY = 0, dragging = false;
  handle.addEventListener('touchstart', e => {
    startY = e.touches[0].clientY; dragging = true;
    sheet.style.transition = 'none';
  }, {passive:true});
  document.addEventListener('touchmove', e => {
    if (!dragging) return;
    const dy = e.touches[0].clientY - startY;
    if (dy > 0) sheet.style.transform = `translateY(${dy}px)`;
  }, {passive:true});
  document.addEventListener('touchend', e => {
    if (!dragging) return;
    dragging = false; sheet.style.transition = '';
    const dy = e.changedTouches[0].clientY - startY;
    sheet.style.transform = '';
    if (dy > 80) closeSheet();
  });
})();

// ── SWIPE TO NAVIGATE ────────────────────────────────
(function(){
  const area = document.getElementById('cam-area');
  let x0 = null, y0 = null, swipeActive = false;
  // Use document-level listeners so touch drift onto child elements doesn't break it
  document.addEventListener('touchstart', e => {
    if (!area.contains(e.target)) return;
    x0 = e.touches[0].clientX; y0 = e.touches[0].clientY; swipeActive = true;
  }, {passive:true});
  document.addEventListener('touchend', e => {
    if (!swipeActive || x0 === null) return;
    swipeActive = false;
    const dx = e.changedTouches[0].clientX - x0;
    const dy = e.changedTouches[0].clientY - y0;
    x0 = null; y0 = null;
    if (Math.abs(dx) > 30 && Math.abs(dx) > Math.abs(dy) * 1.2) {
      if (dx < 0) jumpTo((baseIndex + stepSize()) % cameras.length);
      else         jumpTo((baseIndex - stepSize() + cameras.length) % cameras.length);
    }
  }, {passive:true});
})();

// ── KEYBOARD ─────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key==='ArrowLeft')       jumpTo((baseIndex-stepSize()+cameras.length)%cameras.length);
  if (e.key==='ArrowRight')      jumpTo((baseIndex+stepSize())%cameras.length);
  if (e.key===' ')               { e.preventDefault(); pauseBtn.click(); }
  if (e.key==='f'||e.key==='F')  fsBtn.click();
  if (e.key==='1')               document.getElementById('btn-mode-1').click();
  if (e.key==='4')               document.getElementById('btn-mode-4').click();
});

// ── INIT ──────────────────────────────────────────────
buildList();
render();
startProgress();
startCycle();
setInterval(tickAges, 1000);
</script>
